name: Organize LeetCode Solutions

# Runs automatically whenever LeetHub v2 pushes a new solution folder to the
# repo root, and rebuilds the Language/Difficulty/Topic structure + README
# indexes. You never run anything manually — this is the "no script" path.
#
# No path filter: LeetHub v2 writes new folders straight to root with no
# fixed name, so we can't filter by path. This is safe from infinite loops
# because reorganize.py is idempotent — once a problem is filed and the
# indexes are up to date, a re-run makes no changes, so the "no changes ->
# no commit -> no push" step below stops the chain automatically.

on:
  push:
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab if you ever want to

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Organize, commit, and push (with retry)
        run: |
          git config user.name "leetcode-organizer-bot"
          git config user.email "actions@github.com"

          for i in 1 2 3 4 5; do
            echo "=== Attempt $i/5 ==="
            python scripts/reorganize.py

            git add -A
            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "Auto-organize: sync Language/Difficulty/Topic structure"

            if git push; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected — someone else pushed in the meantime."
            echo "Discarding this attempt and regenerating against the latest state..."
            # README.md and the index files are fully regenerated by the
            # script every run, so there is nothing to "merge" -- rebasing
            # a generated file against itself just creates conflicts. The
            # correct fix is to jump straight to whatever is now on GitHub
            # and regenerate from there, which the next loop iteration does.
            git fetch origin main
            git reset --hard origin/main
          done

          echo "Still failing to push after 5 attempts — giving up for this run."
          exit 1
