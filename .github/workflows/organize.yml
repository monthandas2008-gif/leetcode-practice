name: Organize LeetCode Solutions

# Runs automatically whenever LeetHub v2 pushes a new solution folder to the
# repo root, and rebuilds the Language/Difficulty/Topic structure + README
# indexes. You never run anything manually — this is the "no script" path.
#
# No path filter: LeetHub v2 writes new folders straight to root with no
# fixed name, so we can't filter by path. This is safe from infinite loops
# because reorganize.py is idempotent — once a problem is filed and the
# indexes are up to date, a re-run makes no changes, so the "no changes ->
# no commit -> no push" step below stops the chain automatically.

on:
  push:
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab if you ever want to

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reorganizer
        run: python scripts/reorganize.py

      - name: Commit and push organized structure
        run: |
          git config user.name "leetcode-organizer-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }
          git commit -m "Auto-organize: sync Language/Difficulty/Topic structure"

          # Retry push up to 5 times: if another push (e.g. LeetHub itself)
          # landed on main while this job was running, pull --rebase to
          # catch up, then try again. This resolves the race condition
          # between LeetHub's own commits and this Action's commits.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded."
              break
            fi
            echo "Push rejected (attempt $i/5) — pulling latest changes and retrying..."
            git pull --rebase --autostash origin main
            if [ "$i" -eq 5 ]; then
              echo "Push still failing after 5 attempts — giving up for this run."
              exit 1
            fi
          done
